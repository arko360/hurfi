<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hurfi — Test Site</title>
  <style>
    :root {
      --ink: #15231b;
      --paper: #f3efe6;
      --accent: #2f6b4f;
      --muted: #5c6b62;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #dfece4 0%, transparent 45%),
        linear-gradient(160deg, #f7f3ea 0%, #e7eee8 55%, #d9e4db 100%);
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    main {
      width: min(40rem, 100%);
      text-align: center;
    }

    .brand {
      margin: 0;
      font-size: clamp(2.75rem, 8vw, 4.5rem);
      letter-spacing: -0.04em;
      line-height: 0.95;
      color: var(--accent);
    }

    h1 {
      margin: 1rem 0 0.5rem;
      font-size: clamp(1.25rem, 3vw, 1.75rem);
      font-weight: 600;
    }

    p {
      margin: 0 auto;
      max-width: 28rem;
      color: var(--muted);
      line-height: 1.55;
    }

    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.4rem 0.85rem;
      border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
      color: var(--accent);
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <p class="brand">Hurfi</p>
    <h1>Deployment test page</h1>
    <p>If you can see this on hurfi.com, the static deploy pipeline is working.</p>
    <span class="badge">index.html · ok</span>
  </main>
</body>
</html>

name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect-build-deploy:
    name: Detect → Build → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Detect framework and build artifacts
        id: build
        run: |
          set -euo pipefail
          chmod +x scripts/detect-and-build.sh
          scripts/detect-and-build.sh

      - name: Summarize build
        run: |
          echo "### Deployment build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Framework: \`${{ steps.build.outputs.framework }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact mode: \`${{ steps.build.outputs.artifact_mode }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skip deploy: \`${{ steps.build.outputs.skip_deploy }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Files: \`${{ steps.build.outputs.file_count }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          ls -la deploy_artifact || true

      - name: Validate required secrets
        if: steps.build.outputs.skip_deploy != 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          missing=0
          for v in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY SSH_KNOWN_HOSTS DEPLOY_PATH; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing GitHub Secret: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Add the secrets listed in DEPLOYMENT.md, then re-run this workflow."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Prepare SSH
        if: steps.build.outputs.skip_deploy != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          printf '%s\n' \
            "Host hurfi-deploy" \
            "  HostName ${{ secrets.SSH_HOST }}" \
            "  Port ${{ secrets.SSH_PORT }}" \
            "  User ${{ secrets.SSH_USER }}" \
            "  IdentityFile ~/.ssh/deploy_key" \
            "  IdentitiesOnly yes" \
            "  StrictHostKeyChecking yes" \
            "  UserKnownHostsFile ~/.ssh/known_hosts" \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config
          ssh hurfi-deploy 'echo SSH_OK; hostname; pwd'

      - name: Upload artifacts + remote deploy scripts
        if: steps.build.outputs.skip_deploy != 'true'
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPO_PATH: ${{ secrets.REPO_PATH }}
          MODE: ${{ steps.build.outputs.artifact_mode }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          STAGING="/home/${{ secrets.SSH_USER }}/domains/hurfi.com/shared/staging_${SHA:0:7}"
          REPO_PATH="${REPO_PATH:-/home/${{ secrets.SSH_USER }}/domains/hurfi.com/repo}"

          ssh hurfi-deploy "mkdir -p '$STAGING' && rm -rf '$STAGING'/* '$STAGING'/.[!.]* 2>/dev/null || true; mkdir -p '$STAGING'"

          rsync -az --delete \
            -e "ssh" \
            deploy_artifact/ "hurfi-deploy:$STAGING/"

          ssh hurfi-deploy "mkdir -p '$REPO_PATH/scripts'"
          rsync -az \
            -e "ssh" \
            scripts/remote-deploy.sh "hurfi-deploy:$REPO_PATH/scripts/remote-deploy.sh"

          ssh hurfi-deploy "chmod +x '$REPO_PATH/scripts/remote-deploy.sh' && \
            DEPLOY_PATH='${DEPLOY_PATH}' \
            REPO_PATH='${REPO_PATH}' \
            RELEASES_PATH='/home/${{ secrets.SSH_USER }}/domains/hurfi.com/releases' \
            bash '$REPO_PATH/scripts/remote-deploy.sh' '$STAGING' '$MODE' '$SHA'"

          # Cleanup staging
          ssh hurfi-deploy "rm -rf '$STAGING'"

      - name: Empty project notice
        if: steps.build.outputs.skip_deploy == 'true'
        run: |
          echo "::warning::Repository has no deployable app yet (only placeholder files). Live site was left unchanged."
          echo "Add your website source (e.g. Vite/React/Next/Astro/HTML), push to main, and this workflow will deploy automatically."
          echo "### Skipped publish" >> "$GITHUB_STEP_SUMMARY"
          echo "No application source detected. Server webroot not modified." >> "$GITHUB_STEP_SUMMARY"
          echo "### Still required before first real deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Add GitHub Actions secrets documented in DEPLOYMENT.md" >> "$GITHUB_STEP_SUMMARY"
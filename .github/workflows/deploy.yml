name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect-build-deploy:
    name: Package → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package static HTML site
        id: build
        run: |
          set -euo pipefail
          chmod +x scripts/detect-and-build.sh
          scripts/detect-and-build.sh

      - name: Summarize package
        run: |
          echo "### Deployment package" >> "$GITHUB_STEP_SUMMARY"
          echo "- Framework: \`${{ steps.build.outputs.framework }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact mode: \`${{ steps.build.outputs.artifact_mode }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skip deploy: \`${{ steps.build.outputs.skip_deploy }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Files: \`${{ steps.build.outputs.file_count }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          ls -la deploy_artifact || true

      - name: Validate required secrets
        if: steps.build.outputs.skip_deploy != 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          missing=0
          for v in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY SSH_KNOWN_HOSTS DEPLOY_PATH; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing GitHub Secret: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Add the secrets listed in DEPLOYMENT.md, then re-run this workflow."
            exit 1
          fi
          echo "All required secrets are present."

      - name: Prepare SSH key
        if: steps.build.outputs.skip_deploy != 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/tmp/deploy_key.pub 2>/tmp/deploy_key.err; then
            echo "::error::SSH_PRIVATE_KEY is invalid (libcrypto / parse error)."
            cat /tmp/deploy_key.err || true
            exit 1
          fi

          ACTUAL_FP="$(ssh-keygen -lf ~/.ssh/deploy_key | awk '{print $2}')"
          EXPECTED_FP="SHA256:qPPsmNfETzCQmqajLA3MhAb1VQQr7avnpE3xSc9/SB4"

          echo "Deploy key fingerprint: $(ssh-keygen -lf ~/.ssh/deploy_key)"
          if [ "$ACTUAL_FP" != "$EXPECTED_FP" ]; then
            echo "::error::SSH_PRIVATE_KEY fingerprint mismatch."
            echo "::error::Actual:   $ACTUAL_FP"
            echo "::error::Expected: $EXPECTED_FP"
            exit 1
          fi

          printf '%s\n' "$SSH_KNOWN_HOSTS" | tr -d '\r' > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over SSH
        if: steps.build.outputs.skip_deploy != 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPO_PATH: ${{ secrets.REPO_PATH }}
          MODE: ${{ steps.build.outputs.artifact_mode }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          SSH_OPTS=(
            -i "$HOME/.ssh/deploy_key"
            -p "$SSH_PORT"
            -o IdentitiesOnly=yes
            -o PreferredAuthentications=publickey
            -o PubkeyAuthentication=yes
            -o PasswordAuthentication=no
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o BatchMode=yes
            -o ConnectTimeout=30
          )

          remote() {
            ssh "${SSH_OPTS[@]}" "${SSH_USER}@${SSH_HOST}" "$@"
          }

          echo "Testing SSH connectivity as ${SSH_USER}@${SSH_HOST}:${SSH_PORT} ..."
          if ! remote 'echo SSH_OK; hostname; pwd'; then
            echo "::error::SSH auth failed. Server rejected this private key."
            exit 255
          fi

          SHORT_SHA="${SHA:0:7}"
          STAGING="/home/${SSH_USER}/domains/hurfi.com/shared/staging_${SHORT_SHA}"
          REPO_PATH="${REPO_PATH:-/home/${SSH_USER}/domains/hurfi.com/repo}"
          RELEASES_PATH="/home/${SSH_USER}/domains/hurfi.com/releases"

          echo "Preparing staging: $STAGING"
          remote "mkdir -p '$STAGING' '$REPO_PATH/scripts' '$RELEASES_PATH' && find '$STAGING' -mindepth 1 -delete"

          echo "Uploading artifacts (tar-over-ssh)..."
          tar -C deploy_artifact -czf - . | remote "tar -xzf - -C '$STAGING'"

          echo "Uploading remote-deploy.sh..."
          tar -C scripts -czf - remote-deploy.sh | remote "tar -xzf - -C '$REPO_PATH/scripts'"
          remote "chmod +x '$REPO_PATH/scripts/remote-deploy.sh'"

          echo "Running remote deploy (mode=$MODE)..."
          remote "DEPLOY_PATH='$DEPLOY_PATH' REPO_PATH='$REPO_PATH' RELEASES_PATH='$RELEASES_PATH' \
            bash '$REPO_PATH/scripts/remote-deploy.sh' '$STAGING' '$MODE' '$SHA'"

          echo "Cleaning staging..."
          remote "rm -rf '$STAGING'"

          echo "### Deploy finished" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: \`$DEPLOY_PATH\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: \`$MODE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: \`$SHORT_SHA\`" >> "$GITHUB_STEP_SUMMARY"

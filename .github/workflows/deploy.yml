name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  detect-build-deploy:
    name: Detect → Build → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Detect framework and build artifacts
        id: build
        run: |
          set -euo pipefail
          chmod +x scripts/detect-and-build.sh
          scripts/detect-and-build.sh

      - name: Summarize build
        run: |
          echo "### Deployment build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Framework: \`${{ steps.build.outputs.framework }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifact mode: \`${{ steps.build.outputs.artifact_mode }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Skip deploy: \`${{ steps.build.outputs.skip_deploy }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Files: \`${{ steps.build.outputs.file_count }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          ls -la deploy_artifact || true

      - name: Validate required secrets
        if: steps.build.outputs.skip_deploy != 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          set -euo pipefail
          missing=0
          for v in SSH_HOST SSH_PORT SSH_USER SSH_PRIVATE_KEY SSH_KNOWN_HOSTS DEPLOY_PATH; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing GitHub Secret: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Add the secrets listed in DEPLOYMENT.md, then re-run this workflow."
            exit 1
          fi
          echo "All required secrets are present."

      # Loads the private key into ssh-agent (handles formatting better than echo > file)
      - name: Start SSH agent
        if: steps.build.outputs.skip_deploy != 'true'
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy over SSH
        if: steps.build.outputs.skip_deploy != 'true'
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          REPO_PATH: ${{ secrets.REPO_PATH }}
          MODE: ${{ steps.build.outputs.artifact_mode }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KNOWN_HOSTS" | tr -d '\r' > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Explicit SSH opts — do not rely on Host aliases between steps
          SSH_OPTS=(
            -p "$SSH_PORT"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts"
            -o BatchMode=yes
            -o ConnectTimeout=30
          )

          remote() {
            ssh "${SSH_OPTS[@]}" "${SSH_USER}@${SSH_HOST}" "$@"
          }

          echo "Testing SSH connectivity..."
          remote 'echo SSH_OK; hostname; pwd; which rsync || echo NO_RSYNC; which tar'

          SHORT_SHA="${SHA:0:7}"
          STAGING="/home/${SSH_USER}/domains/hurfi.com/shared/staging_${SHORT_SHA}"
          REPO_PATH="${REPO_PATH:-/home/${SSH_USER}/domains/hurfi.com/repo}"
          RELEASES_PATH="/home/${SSH_USER}/domains/hurfi.com/releases"

          echo "Preparing staging: $STAGING"
          remote "mkdir -p '$STAGING' '$REPO_PATH/scripts' '$RELEASES_PATH' && find '$STAGING' -mindepth 1 -delete"

          echo "Uploading artifacts (tar-over-ssh; works even if remote rsync is missing)..."
          tar -C deploy_artifact -czf - . | remote "tar -xzf - -C '$STAGING'"

          echo "Uploading remote-deploy.sh..."
          tar -C scripts -czf - remote-deploy.sh | remote "tar -xzf - -C '$REPO_PATH/scripts'"
          remote "chmod +x '$REPO_PATH/scripts/remote-deploy.sh'"

          echo "Running remote deploy (mode=$MODE)..."
          remote "DEPLOY_PATH='$DEPLOY_PATH' REPO_PATH='$REPO_PATH' RELEASES_PATH='$RELEASES_PATH' \
            bash '$REPO_PATH/scripts/remote-deploy.sh' '$STAGING' '$MODE' '$SHA'"

          echo "Cleaning staging..."
          remote "rm -rf '$STAGING'"

          echo "### Deploy finished" >> "$GITHUB_STEP_SUMMARY"
          echo "- Target: \`$DEPLOY_PATH\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: \`$MODE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA: \`$SHORT_SHA\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Empty project notice
        if: steps.build.outputs.skip_deploy == 'true'
        run: |
          echo "::warning::Repository has no deployable app yet (only placeholder files). Live site was left unchanged."
          echo "Add your website source (e.g. Vite/React/Next/Astro/HTML), push to main, and this workflow will deploy automatically."
          echo "### Skipped publish" >> "$GITHUB_STEP_SUMMARY"
          echo "No application source detected. Server webroot not modified." >> "$GITHUB_STEP_SUMMARY"
          echo "### Still required before first real deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Add GitHub Actions secrets documented in DEPLOYMENT.md" >> "$GITHUB_STEP_SUMMARY"
